project_name: chien_deepfake
model_name: spsl

data:
  ffpp_root: "D:/duong_huy_ct7/deepfake-data"
  celebdf_test_root: "D:/duong_huy_ct7/deepfake-data/celeb-df/test"
  image_size: 256
  batch_size: 16
  num_workers: 4
  mean: [0.5, 0.5, 0.5]
  std: [0.5, 0.5, 0.5]

model:
  name: spsl
  pretrained: "pretrained/xception-b5690688.pth"
  backbone_config:
    mode: original
    num_classes: 2
    inc: 4
    dropout: false

augmentation:
  enabled: true
  horizontal_flip: 0.5
  rotate_limit: 10
  blur_prob: 0.5
  blur_limit: [3, 7]
  brightness_prob: 0.5
  brightness_limit: [-0.1, 0.1]
  contrast_limit: [-0.1, 0.1]
  quality_lower: 40
  quality_upper: 100

loss:
  type: cross_entropy
  class_weight: null

optimizer:
  type: adam
  learning_rate: 0.0002
  weight_decay: 0.0005
  betas: [0.9, 0.999]
  eps: 0.00000001
  amsgrad: false

scheduler: null

training:
  epochs: 50
  seed: 1024
  early_stopping_patience: 5
  save_dir: "checkpoints"
  cuda: true

evaluation:
  results_dir: "results"
  metrics: [accuracy, f1_score, precision, recall, auc]

logging:
  log_dir: "logs/spsl"
